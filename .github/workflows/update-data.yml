name: Refresh Dashboard Data

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh data from GitHub Actions artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/update_data.py --source commits --branch xs-dev --max-pages 5 --per-page 100

      - name: Commit updated data
        run: |
          if git diff --quiet -- site/data; then
            echo "No dashboard data changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data
          git commit -m "chore: refresh dashboard data"
          git push
